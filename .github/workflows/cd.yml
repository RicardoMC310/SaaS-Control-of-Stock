name: CD

on:
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  deploy:
    name: Build e Push Docker
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build imagem
        run: docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/arias-backend:latest ./backend

      - name: Push imagem
        run: docker push ${{ secrets.DOCKER_HUB_USERNAME }}/arias-backend:latest