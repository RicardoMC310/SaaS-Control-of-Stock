name: CD

on:
    pull_request:
        branches: [main]
        types: [ closed ]  

jobs:
    deploy:
        name: Deploy Docker
        if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.ref == 'development'
        runs-on: ubuntu-latest

        steps:

            - name: Checkout
              uses: actions/checkout@v4
              with:
                ref: main

            - name: Get Version from package.json
              id: version
              run: |
                VERSION=$(node -p "require('./backend/package.json').version")
                echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
                echo "📦 Versão: $VERSION"

            - name: Setup Docker Buildx
              uses: docker/setup-buidx-action@v4


            - name: Login Docker
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKER_HUB_USERNAME }}
                password: ${{ secrets.DOCKER_HUB_TOKEN }}

            - name: Generate Tags
              id: meta
              run: |
                echo "DATE=$(date -u +'%Y%m%d')" >> $GITHUB_OUTPUT
                echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
                echo "VERSION=${{ steps.version.outputs.VERSION }}" >> $GITHUB_OUTPUT

            - name: Build and Push
              uses: docker/build-push-action@v6
              with:
                context: ./backend
                push: true
                tags: |
                    ${{ secrets.DOCKER_HUB_USERNAME }}/arias-backend:${{ steps.version.outputs.VERSION }}
                    ${{ secrets.DOCKER_HUB_USERNAME }}/arias-backend:latest
                    ${{ secrets.DOCKER_HUB_USERNAME }}/arias-backend:prod-${{ steps.meta.outputs.DATE }}-${{ steps.meta.outputs.SHORT_SHA }}
                build-args: |
                    NODE_ENV=production
                cache-from: type=gha
                cache-to: type=gha,mode=max

            

